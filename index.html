<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduAccess | Inclusive Learning Platform</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#4f46e5',
                        secondary: '#10b981'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- TensorFlow.js for Object Detection -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.20.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.2/dist/coco-ssd.min.js"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body class="animated-bg text-slate-900 transition-colors duration-300 antialiased overflow-hidden">
    <!-- Live Region for Screen Readers -->
    <div id="aria-live-region" class="sr-only" aria-live="polite"></div>

    <!-- Visual Notification Edge Flash -->
    <div id="visual-notification-edge"
        class="fixed inset-0 pointer-events-none z-[9999] opacity-0 transition-opacity duration-300 border-8 border-transparent">
    </div>

    <!-- Auth Screen -->
    <section id="login-view"
        class="h-screen w-screen flex flex-col items-center justify-center transition-transform duration-500 absolute inset-0 z-[50]">
        <div class="glass p-10 rounded-3xl shadow-2xl w-full max-w-md focus-element" tabindex="0"
            onfocus="speakNode(this)" onmouseover="speakNode(this)" aria-label="Login Window">
            <div class="flex items-center gap-3 text-indigo-600 dark:text-indigo-400 font-bold text-3xl mb-8">
                <i data-lucide="graduation-cap" class="w-10 h-10"></i>
                <span>EduAccess</span>
            </div>
            <h1 class="text-2xl font-bold mb-2">Welcome Back</h1>
            <p class="text-slate-500 mb-8">Sign in to your inclusive workspace</p>

            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold mb-2" for="email">Student ID / Email</label>
                    <input type="text" id="email"
                        class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 dark:bg-slate-700 dark:border-slate-600 outline-none transition-all"
                        placeholder="Enter your ID">
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-2" for="password">Password</label>
                    <input type="password" id="password"
                        class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 dark:bg-slate-700 dark:border-slate-600 outline-none transition-all"
                        placeholder="••••••••">
                </div>
                <button onclick="showRoleSelection()"
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-xl transition-all mt-4 focus-element"
                    aria-label="Enter Portal button">
                    Enter Portal
                </button>
            </div>
        </div>
    </section>

    <!-- Role Selection -->
    <section id="role-view"
        class="h-screen w-screen flex flex-col items-center justify-center transition-transform duration-500 absolute inset-0 z-[40] translate-y-full">
        <h2 class="text-4xl font-bold mb-10 focus-element" tabindex="0" onfocus="speakNode(this)">Select Your Profile
        </h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 max-w-5xl w-full px-6">
            <button onclick="initPortal('blind')"
                class="glass p-8 rounded-3xl shadow-lg border-2 border-transparent hover:border-indigo-500 hover:shadow-indigo-100 hover:bg-white/50 transition-all flex flex-col items-center gap-6 group focus-element"
                aria-label="Blind Student Profile">
                <div
                    class="w-20 h-20 rounded-full bg-purple-100 text-purple-600 flex items-center justify-center group-hover:scale-110 transition-transform">
                    <i data-lucide="eye-off" class="w-10 h-10"></i>
                </div>
                <h3 class="text-xl font-bold">Blind Student</h3>
                <p class="text-slate-500 text-sm">Optimized for Screen Readers & Voice Control</p>
            </button>

            <button onclick="initPortal('hearing')"
                class="glass p-8 rounded-3xl shadow-lg border-2 border-transparent hover:border-indigo-500 hover:shadow-indigo-100 hover:bg-white/50 transition-all flex flex-col items-center gap-6 group focus-element"
                aria-label="Hearing Impaired Profile">
                <div
                    class="w-20 h-20 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center group-hover:scale-110 transition-transform">
                    <i data-lucide="ear-off" class="w-10 h-10"></i>
                </div>
                <h3 class="text-xl font-bold">Hearing Impaired</h3>
                <p class="text-slate-500 text-sm">Rich Visuals, Captions & Sign Language</p>
            </button>

            <button onclick="initPortal('admin')"
                class="glass p-8 rounded-3xl shadow-lg border-2 border-transparent hover:border-indigo-500 hover:shadow-indigo-100 hover:bg-white/50 transition-all flex flex-col items-center gap-6 group focus-element"
                aria-label="System Administration Profile">
                <div
                    class="w-20 h-20 rounded-full bg-orange-100 text-orange-600 flex items-center justify-center group-hover:scale-110 transition-transform">
                    <i data-lucide="layout-dashboard" class="w-10 h-10"></i>
                </div>
                <h3 class="text-xl font-bold">System Admin</h3>
                <p class="text-slate-500 text-sm">Management & Analytics Dashboard</p>
            </button>
        </div>
    </section>

    <!-- App Shell -->
    <div id="app-shell"
        class="h-screen w-screen flex absolute inset-0 z-[30] translate-x-full transition-transform duration-500">
        <!-- Sidebar -->
        <aside class="w-72 glass border-r border-white/20 dark:border-slate-700 flex flex-col transition-all z-20">
            <div
                class="p-6 flex items-center gap-3 text-indigo-700 dark:text-indigo-300 font-bold text-2xl border-b border-white/20 dark:border-slate-700">
                <i data-lucide="graduation-cap"></i> EduAccess
            </div>

            <nav class="flex-1 p-4 space-y-2 overflow-y-auto" id="sidebar-nav">
                <!-- Nav items injected via JS based on role -->
            </nav>

            <div class="p-4 border-t border-slate-100 dark:border-slate-700 space-y-2">
                <p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 px-3">Accessibility Tools</p>
                <div class="flex items-center justify-between px-3 py-2 bg-slate-50 dark:bg-slate-700/50 rounded-lg">
                    <span class="text-sm font-medium">Low Vision Mode</span>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" class="sr-only peer" id="low-vision-toggle" onchange="toggleLowVision()">
                        <div
                            class="w-11 h-6 bg-slate-300 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-indigo-600">
                        </div>
                    </label>
                </div>

                <!-- Screen Reader / TTS Master Toggle -->
                <div class="flex items-center justify-between px-3 py-2 bg-slate-50 dark:bg-slate-700/50 rounded-lg focus-element"
                    id="tts-toggle-container">
                    <span class="text-sm font-medium">Audio Reader</span>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" class="sr-only peer" id="tts-toggle" onchange="toggleTTS()" checked>
                        <div
                            class="w-11 h-6 bg-slate-300 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-indigo-600">
                        </div>
                    </label>
                </div>

                <button onclick="location.reload()"
                    class="w-full flex items-center gap-3 px-3 py-2 text-red-500 hover:bg-red-50 dark:hover:bg-red-500/10 rounded-lg transition-colors mt-2 focus-element"
                    aria-label="Sign Out">
                    <i data-lucide="log-out" class="w-5 h-5"></i> <span>Sign Out</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col h-full overflow-hidden relative">
            <!-- Header section for Voice/Gesture active chips -->
            <header
                class="h-20 glass border-b border-white/20 dark:border-slate-700 flex items-center justify-between px-8 z-[10]">
                <div class="flex items-center gap-4">
                    <button onclick="buildDashboard()"
                        class="p-3 bg-white/50 hover:bg-white dark:bg-slate-800 dark:hover:bg-slate-700 rounded-xl transition-colors focus-element shadow hidden border border-slate-200"
                        id="back-btn" aria-label="Go Back to Dashboard" onmouseover="speakNode(this)"
                        onfocus="speakNode(this)">
                        <i data-lucide="arrow-left" class="w-6 h-6 text-slate-700 dark:text-slate-300"></i>
                    </button>
                    <h2 id="view-title" class="text-2xl font-bold focus-element text-slate-800 dark:text-white"
                        tabindex="0">Dashboard</h2>
                </div>
                <div class="flex gap-3 items-center">
                    <div id="voice-listening-badge"
                        class="hidden bg-red-100 text-red-600 px-4 py-2 rounded-full text-sm font-bold flex items-center gap-2 animate-pulse">
                        <i data-lucide="mic" class="w-4 h-4"></i> Voice Active
                    </div>
                    <div id="gesture-active-badge"
                        class="hidden bg-emerald-100 text-emerald-600 px-4 py-2 rounded-full text-sm font-bold flex items-center gap-2">
                        <i data-lucide="hand" class="w-4 h-4"></i> Gestures On
                    </div>
                </div>
            </header>

            <div id="dynamic-content" class="flex-1 overflow-y-auto p-8 relative">
                <!-- Content injected via JS -->
            </div>

        </main>
    </div>

    <!-- Reusable Modal/Overlay System for AI tools/Video/Camera -->
    <div id="unified-modal"
        class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-[100] hidden items-center justify-center p-4">
        <div
            class="bg-white dark:bg-slate-800 w-full max-w-4xl rounded-2xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
            <div class="flex items-center justify-between p-6 border-b border-slate-100 dark:border-slate-700">
                <h3 id="modal-heading" class="text-xl font-bold focus-element" tabindex="0">Module Content</h3>
                <button onclick="closeModal()"
                    class="p-2 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-full transition-colors focus-element"
                    aria-label="Close Modal">
                    <i data-lucide="x"></i>
                </button>
            </div>
            <div id="modal-inner-content" class="p-6 overflow-y-auto flex-1 bg-slate-50 dark:bg-slate-900/50">
                <!-- Inner injected via JS -->
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
